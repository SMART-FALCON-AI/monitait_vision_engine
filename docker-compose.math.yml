# Compose override that adds the math_inference service.
# Use:  docker compose -f docker-compose.yml -f docker-compose.math.yml up -d math_inference
# The image is loaded externally (docker load -i math_inference.tar.gz); this override
# does NOT build — it just runs the pre-loaded image.
services:
  math_inference:
    image: math_inference:latest
    command: "uvicorn main:app --host 0.0.0.0 --port 4443 --workers ${MATH_WORKERS:-1}"
    expose:
      - 4443
    volumes:
      - ./math_inference:/code
    environment:
      - MATH_TILES_X=${MATH_TILES_X:-1}
      - MATH_TILES_Y=${MATH_TILES_Y:-1}
      - MATH_BANDS=${MATH_BANDS:-8}
      - MATH_FFT_TOP_K=${MATH_FFT_TOP_K:-3}
      - MATH_FLAT_FIELD_ENABLE=${MATH_FLAT_FIELD_ENABLE:-false}
    networks:
      - main_network
    logging:
      options:
        max-size: "10m"
        max-file: "2"
    restart: "always"
    deploy:
      replicas: ${MATH_REPLICAS:-1}
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
