services:
  # Vision Processing Engine
  # Uses the pre-built monitait/mve image (pulled by setup.sh from
  # registry.monitait.com, Docker Hub fallback). For local dev, use
  # docker-compose.override.yml to swap `image:` for `build: ./vision_engine`.
  monitait_vision_engine:
    container_name: "monitait_vision_engine"
    image: monitait/mve:latest
    # v4.0.81 — was `python3 main.py`. Now runs startup.sh which offline-
    # installs any missing wheels from /wheels (currently just pypylon
    # for Basler USB3 Vision) BEFORE exec'ing python3 main.py. The
    # install target is the container's writable overlay, so it's lost
    # on `docker compose up --force-recreate` — but the script re-runs
    # on every boot and re-installs, so the operator never has to
    # manually re-install after a rebuild. Fully self-healing.
    command: "sh /code/startup.sh"
    volumes:
      - ./VERSION:/code/VERSION:ro
      - ./vision_engine:/code  # 3.21.9 — bind-mount source so scp -> live update (no rebuild)
      # v4.0.81 — bind-mount the offline wheels directory (currently just
      # pypylon for Basler support). See vision_engine/startup.sh which
      # `pip install --no-index`s any pypylon-*.whl on boot if the module
      # isn't already importable. Required on sites whose container can't
      # reach files.pythonhosted.org (vteam12, khoy, kiancord). Read-only
      # so a bug in the container can't clobber our wheels.
      - ./wheels:/wheels:ro
      - ${DATA_ROOT:-.}/raw_images:/code/raw_images
      # 4.0.64 — cold-queue disk overflow. Previously MVE wrote frame
      # batches to /tmp/cold_queue INSIDE the container's writable overlay
      # layer, which meant the queue silently grew inside Docker's storage
      # driver, invisible from `df` on the host, until it ate the entire
      # disk (vteam12 hit 97 GB with no operator warning). Bind-mounting
      # it to a named host directory makes the growth visible to `df` and
      # `du`, lets ops rotate/archive it, and keeps it OUT of the container
      # overlay so `docker system df` stops lying about disk usage.
      - ${DATA_ROOT:-.}/cold_queue:/tmp/cold_queue
      - ./volumes/weights:/weights
      - /dev:/dev  # Linux: serial (/dev/ttyUSB*), cameras (/dev/video*), barcode scanner (/dev/input/*)
    ports:
      - "80:5050"  # Vision engine status page
    privileged: ${PRIVILEGED:-true}
    # Set by start.py: true on Linux (device access), false on Windows
    networks:
      - main_network
    environment:
      # Web server configuration
      - WEB_SERVER_PORT=5050
      - WEB_SERVER_HOST=0.0.0.0
      # 4.0.64 — Cold-queue safety caps. Both are enforced by
      # services.watcher.ColdDiskQueue. The BYTES cap evicts oldest-first
      # on every put() so we cannot overshoot; the MAX_AGE_SECONDS drives
      # a periodic janitor that also expires stale batches even below the
      # cap. Defaults chosen conservatively — bump for a bigger disk.
      - COLD_QUEUE_MAX_BYTES=${COLD_QUEUE_MAX_BYTES:-5368709120}   # 5 GB
      - COLD_QUEUE_MAX_AGE_SECONDS=${COLD_QUEUE_MAX_AGE_SECONDS:-600}
      # Note: All settings (infrastructure, serial port, ejector, capture, cameras, image processing, etc.)
      #       are configured via the web interface at http://localhost:5050/status
      #       and saved to .env.prepared_query_data for persistence
    # 4.0.47 — MVE depends on its persistent data stores being healthy at boot.
    # It does NOT depend on yolo_inference / math_inference because those are
    # called via HTTP per-frame and the call sites already retry; making MVE
    # block on them at startup would mean a slow GPU init delays every MVE
    # boot instead of just delaying the first inference.
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 4.0.48 — frame-recency healthcheck (refined).
    # Reads /api/health/watchdog and exits non-zero when `stalled=true`.
    # 4.0.48 narrows the stall definition to "captures > 0 AND inferences == 0
    # in the last 120s" — i.e. frames ARE being grabbed but the inference
    # path is broken. Pure idle (no captures, no inferences) is now treated
    # as healthy so we don't restart-loop a peacefully-parked line.
    # Operator-parked shipment=no_shipment is also always healthy.
    #
    # Tuning: interval=90s + retries=4 (= 6 minutes of stuck state before a
    # restart fires). Generous so we never restart a line during a brief
    # network hiccup or yolo container warmup. start_period=180s lets MVE
    # enumerate cameras + warm caches without false trigger on first boot.
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,json,sys; d=json.loads(urllib.request.urlopen('http://127.0.0.1:5050/api/health/watchdog',timeout=8).read()); sys.exit(1 if d.get('stalled') else 0)\""]
      interval: 90s
      timeout: 10s
      retries: 4
      start_period: 180s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: "always"

  # Redis Cache & Message Queue
  redis:
    container_name: "monitait_redis"
    image: redis:7-alpine
    command: ["redis-server", "--notify-keyspace-events", "KEA", "--stop-writes-on-bgsave-error", "no", "--maxmemory", "${REDIS_MAXMEMORY:-256}mb", "--maxmemory-policy", "allkeys-lru"]
    expose:
      - 6379
    volumes:
      - ${DATA_ROOT:-.}/volumes/redis:/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      options:
        max-size: "5m"
        max-file: "2"
    restart: "always"

  # YOLO AI Inference Service (replicas load-balanced via Docker DNS round-robin)
  yolo_inference:
    image: yolo_inference
    build: "./yolo_inference"
    shm_size: '${SHM_SIZE:-2g}'
    command: "uvicorn main:app --host 0.0.0.0 --port 4442 --workers ${YOLO_WORKERS:-2}"
    expose:
      - 4442
    volumes:
      - ./yolo_inference:/code
      - ./volumes/weights:/weights
    environment:
      - YOLO_CONF_THRESHOLD=0.3
      - YOLO_IOU_THRESHOLD=0.4
    networks:
      - main_network
    logging:
      options:
        max-size: "10m"
        max-file: "2"
    restart: "always"
    deploy:
      replicas: ${YOLO_REPLICAS:-1}
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Math Inference Service — pure-math measurement channels (FFT, gradients,
  # morphology, band stats, tile anomalies, etc.). GPU reservation is SOFT
  # (Compose v2 reservation semantics): uses GPU if present, falls back to
  # CPU cleanly if not. Runtime backend auto-selected inside the container
  # (CuPy → numpy). Register it in the Inference tab as a YOLO-type model
  # with URL http://math_inference:4443/v1/math/analyze — no MVE code change.
  math_inference:
    image: math_inference
    build: "./math_inference"
    command: "uvicorn main:app --host 0.0.0.0 --port 4443 --workers ${MATH_WORKERS:-1}"
    expose:
      - 4443
    volumes:
      - ./math_inference:/code
    environment:
      - MATH_TILES_X=${MATH_TILES_X:-1}
      - MATH_TILES_Y=${MATH_TILES_Y:-1}
      # v4.0.68 — MATH_BANDS default 8 → 1 and MATH_FFT_TOP_K default 3 → 1.
      # Prior defaults emitted ~200 features per frame per camera (8 bands × 4
      # metrics per band × direction + 3 FFT peaks × 3 axes) which downstream
      # amplified into ~200 DB writes + ~200 disk writes + ~200 audio-queue
      # pushes PER frame. On vteam12's shipment workload this saturated the
      # RTX 3050 GPU and forced uvicorn workers to compete with detection
      # callback threads for CPU — the dashboard stopped responding under
      # steady-state capture. 1 band + 1 FFT peak cuts per-frame output to
      # ~15 features (still enough for anomaly QC) and keeps the pipeline
      # inside the machine's real capacity. Operators who need finer
      # granularity can raise via env var at deploy time.
      - MATH_BANDS=${MATH_BANDS:-1}
      - MATH_FFT_TOP_K=${MATH_FFT_TOP_K:-1}
      - MATH_FLAT_FIELD_ENABLE=${MATH_FLAT_FIELD_ENABLE:-false}
      # v4.0.69 — spacing_anomalies + blobs are per-scene loops. On busy
      # textures a single frame emitted 100+ localized detections between
      # them (row_spacing_anomaly, col_spacing_anomaly, blob_brightness,
      # blob_darkness), and each downstream became a per-detection audio
      # lookup + DB row + disk write + Redis publish in MVE. Turning them
      # OFF by default keeps the math channel bounded; deployments that
      # actually inspect fabric/weft/blob geometry can flip them back to
      # `true` (and raise MATH_LOCAL_TOPK to cap the per-signal loop).
      - MATH_SPACING_ENABLE=${MATH_SPACING_ENABLE:-false}
      - MATH_BLOBS_ENABLE=${MATH_BLOBS_ENABLE:-false}
      - MATH_LOCAL_TOPK=${MATH_LOCAL_TOPK:-8}
    networks:
      - main_network
    logging:
      options:
        max-size: "10m"
        max-file: "2"
    restart: "always"
    deploy:
      replicas: ${MATH_REPLICAS:-1}
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Anomaly Inference Service — pixel-stat baseline anomaly detection.
  # Same URL shape as yolo/math: MVE talks to it as one more inference
  # source per frame. Each detection comes back as a class="anomaly" bbox
  # with confidence, flowing through the standard detection pipeline
  # (Process tab Show / min_confidence / Severity all apply automatically).
  # Baselines are per (camera × phase × mode) — same mode keys as the
  # colour heatmap (camera / shipment_start / target / reference_frame).
  anomaly_inference:
    container_name: "monitait_anomaly_inference"
    image: anomaly_inference
    build: "./anomaly_inference"
    # 1 worker for V1 — baseline cache is per-process; running >1 uvicorn
    # worker would split the in-memory baseline cache across processes.
    # Lazy-load-from-disk-on-miss in main.py also recovers, but 1 worker
    # makes "build baseline → immediately detect" the same-process path.
    command: "uvicorn main:app --host 0.0.0.0 --port 4444 --workers ${ANOMALY_WORKERS:-1}"
    expose:
      - 4444
    volumes:
      - ./anomaly_inference:/code
      - ${DATA_ROOT:-.}/volumes/anomaly_baselines:/baselines
    environment:
      - ANOMALY_Z_THRESHOLD=${ANOMALY_Z_THRESHOLD:-3.0}
      - ANOMALY_WORK_W=${ANOMALY_WORK_W:-320}
      - ANOMALY_WORK_H=${ANOMALY_WORK_H:-180}
      - ANOMALY_MIN_AREA_WORK=${ANOMALY_MIN_AREA_WORK:-60}
      - ANOMALY_MAX_BBOXES=${ANOMALY_MAX_BBOXES:-32}
    networks:
      - main_network
    logging:
      options:
        max-size: "10m"
        max-file: "2"
    restart: "always"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:4444/v1/anomaly-detection/anomaly_v1/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # TimescaleDB PostgreSQL Database
  timescaledb:
    container_name: "monitait_timescaledb"
    image: timescale/timescaledb:latest-pg15
    expose:
      - 5432
    environment:
      - POSTGRES_USER=monitaqc
      - POSTGRES_PASSWORD=monitaqc2024
      - POSTGRES_DB=monitaqc
    volumes:
      - ${DATA_ROOT:-.}/volumes/timescaledb:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - main_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitaqc"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: "always"

  # 4.0.47 — grafana service removed (unused on sites; operator views charts
  # via MVE's Charts tab. Was previously taking RAM + disk and the only
  # depends_on link in compose).

  # PiGallery2 Image Gallery
  pigallery2:
    container_name: "monitait_pigallery2"
    image: bpatrik/pigallery2:latest
    ports:
      - "5000:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ${DATA_ROOT:-.}/raw_images:/app/data/images:ro
      - ${DATA_ROOT:-.}/volumes/pigallery2_config:/app/data/config
      - ${DATA_ROOT:-.}/volumes/pigallery2_db:/app/data/db
    networks:
      - main_network
    logging:
      options:
        max-size: "10m"
        max-file: "2"
    restart: "always"

networks:
  main_network:
    driver: bridge

# Use deploy/start.py (or deploy/start.sh / deploy/start.bat) to auto-detect OS,
# hardware, and generate .env with correct DATA_ROOT, PRIVILEGED, YOLO tuning, etc.
